name: Secret Scan

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:

jobs:
  secret-scan:
    uses: YOLOTECHNOLOGY/security-workflows/.github/workflows/secret-scan-reusable.yml@main
    secrets:
      LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
      SECURITY_WORKFLOW_READER_TOKEN: ${{ secrets.SECURITY_WORKFLOW_READER_TOKEN }}
